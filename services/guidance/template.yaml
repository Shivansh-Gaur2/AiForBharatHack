AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Guidance Service - Personalized Credit Guidance

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.13
    Environment:
      Variables:
        LOG_LEVEL: INFO
        ENVIRONMENT: production
        STORAGE_BACKEND: dynamodb

Resources:
  # DynamoDB table
  GuidanceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rural-credit-guidance
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: service
          Value: guidance
        - Key: project
          Value: rural-credit-advisor

  # SNS Topic for events
  GuidanceEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: guidance-events
      Tags:
        - Key: service
          Value: guidance

  # Lambda function
  GuidanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services.guidance.app.main.handler
      CodeUri: ../../
      Description: Guidance Service Lambda
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref GuidanceTable
          SNS_TOPIC_ARN: !Ref GuidanceEventsTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GuidanceTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt GuidanceEventsTopic.TopicName
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        HealthCheck:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET

Outputs:
  GuidanceApi:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  GuidanceFunction:
    Description: Lambda function ARN
    Value: !GetAtt GuidanceFunction.Arn
  GuidanceTable:
    Description: DynamoDB table name
    Value: !Ref GuidanceTable
