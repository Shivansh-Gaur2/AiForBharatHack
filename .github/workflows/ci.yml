name: CI — All Services

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements.txt"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy boto3-stubs[dynamodb,sns,sqs]

      - name: Ruff lint
        run: ruff check services/

      - name: Ruff format check
        run: ruff format --check services/

      - name: Mypy type-check (all services)
        run: |
          mypy services/profile_service/app/ --ignore-missing-imports
          mypy services/loan_tracker/app/ --ignore-missing-imports
          mypy services/risk_assessment/app/ --ignore-missing-imports
          mypy services/cashflow_service/app/ --ignore-missing-imports
          mypy services/early_warning/app/ --ignore-missing-imports
          mypy services/guidance/app/ --ignore-missing-imports
          mypy services/security/app/ --ignore-missing-imports

  test:
    name: Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service:
          - profile_service
          - loan_tracker
          - risk_assessment
          - cashflow_service
          - early_warning
          - guidance
          - security

    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: sns,sqs

    env:
      DYNAMODB_ENDPOINT_URL: http://localhost:8000
      SNS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: ap-south-1
      AWS_DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      SKIP_AUTH: "true"
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e services/shared

      - name: Create DynamoDB test tables
        run: |
          for table in profiles loans risk cashflow early-warning guidance security; do
            aws dynamodb create-table \
              --endpoint-url http://localhost:8000 \
              --table-name "${table}-test" \
              --attribute-definitions \
                AttributeName=PK,AttributeType=S \
                AttributeName=SK,AttributeType=S \
              --key-schema \
                AttributeName=PK,KeyType=HASH \
                AttributeName=SK,KeyType=RANGE \
              --billing-mode PAY_PER_REQUEST \
              --region ap-south-1 2>/dev/null || true
          done

      - name: Run tests — ${{ matrix.service }}
        run: |
          python -m pytest services/${{ matrix.service }}/tests/ \
            -m "not e2e" \
            --tb=short \
            -q \
            --cov=services/${{ matrix.service }} \
            --cov-report=term-missing \
            --junitxml=results/${{ matrix.service }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: results/

  build:
    name: SAM Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [profile_service, loan_tracker, risk_assessment, cashflow_service, early_warning, guidance, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build (${{ matrix.service }})
        run: |
          cd services/${{ matrix.service }}
          sam build

      - name: SAM Validate (${{ matrix.service }})
        run: |
          cd services/${{ matrix.service }}
          sam validate --lint
