# Docker Compose — Local Development Environment
# Provides DynamoDB Local and LocalStack (SQS/SNS) for offline development.
#
# Usage:
#   docker-compose up -d
#   Then run the FastAPI app with: uvicorn services.profile_service.app.main:app --reload

version: "3.8"

services:
  # -----------------------------------------------------------------------
  # DynamoDB Local — emulates DynamoDB for dev/test
  # -----------------------------------------------------------------------
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: rural-credit-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data

  # -----------------------------------------------------------------------
  # DynamoDB Table Creator — runs once to create required tables
  # -----------------------------------------------------------------------
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ap-south-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 8
        aws dynamodb create-table \
          --table-name rural-credit-profiles \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'profiles table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-loans \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'loans table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-risk \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'risk table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-cashflow \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'cashflow table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-early-warning \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'early-warning table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-guidance \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'guidance table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-security \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'security table already exists'
        aws dynamodb create-table \
          --table-name rural-credit-conversations \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
          2>/dev/null || echo 'conversations table already exists'

  # -----------------------------------------------------------------------
  # LocalStack — emulates SNS/SQS for event bus testing
  # -----------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: rural-credit-localstack
    ports:
      - "4566:4566"    # All services via single port
    environment:
      SERVICES: sns,sqs
      DEFAULT_REGION: ap-south-1
      DOCKER_HOST: unix:///var/run/docker.sock

volumes:
  dynamodb-data:
