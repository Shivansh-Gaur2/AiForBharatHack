AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Advisor Service - Conversational AI for rural credit guidance

Globals:
  Function:
    Timeout: 30
    Runtime: python3.13
    MemorySize: 512
    Environment:
      Variables:
        LOG_LEVEL: INFO
        ENVIRONMENT: production
        STORAGE_BACKEND: dynamodb

Resources:
  AIAdvisorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: services.ai_advisor.app.main.handler
      CodeUri: ../../
      Description: AI Advisor - conversational credit guidance
      Environment:
        Variables:
          LLM_PROVIDER: "groq"
          GROQ_API_KEY: !Ref GroqApiKey
          GROQ_MODEL_ID: !Ref GroqModelId
          USE_STUB_LLM: "false"
          PROFILE_SERVICE_URL: !Ref ProfileServiceUrl
          RISK_SERVICE_URL: !Ref RiskServiceUrl
          CASHFLOW_SERVICE_URL: !Ref CashFlowServiceUrl
          LOAN_SERVICE_URL: !Ref LoanServiceUrl
          EARLY_WARNING_SERVICE_URL: !Ref EarlyWarningServiceUrl
          GUIDANCE_SERVICE_URL: !Ref GuidanceServiceUrl
      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rural-credit-conversations

Parameters:
  GroqApiKey:
    Type: String
    NoEcho: true
    Description: Groq API key for Llama inference
    Default: ""
  GroqModelId:
    Type: String
    Default: llama-3.3-70b-versatile
    Description: Groq model ID (Llama 3.3 70B)
  ProfileServiceUrl:
    Type: String
    Default: ""
  RiskServiceUrl:
    Type: String
    Default: ""
  CashFlowServiceUrl:
    Type: String
    Default: ""
  LoanServiceUrl:
    Type: String
    Default: ""
  EarlyWarningServiceUrl:
    Type: String
    Default: ""
  GuidanceServiceUrl:
    Type: String
    Default: ""
