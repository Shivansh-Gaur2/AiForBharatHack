name: CI — All Services

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/profile_service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/profile_service/requirements-dev.txt

      - name: Ruff lint
        run: ruff check services/

      - name: Ruff format check
        run: ruff format --check services/

      - name: Mypy type-check (all services)
        run: |
          mypy services/profile_service/app/ --ignore-missing-imports
          mypy services/loan_tracker/app/ --ignore-missing-imports
          mypy services/risk_assessment/app/ --ignore-missing-imports
          mypy services/cashflow_service/app/ --ignore-missing-imports
          mypy services/early_warning/app/ --ignore-missing-imports
          mypy services/guidance/app/ --ignore-missing-imports
          mypy services/security/app/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    env:
      DYNAMODB_ENDPOINT_URL: http://localhost:8000
      DYNAMODB_TABLE_NAME: profiles-test
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      SKIP_AUTH: "true"
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/profile_service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/profile_service/requirements-dev.txt

      - name: Create DynamoDB test tables
        run: |
          for table in profiles-test loans-test risk-test cashflow-test early-warning-test guidance-test security-test; do
            aws dynamodb create-table \
              --endpoint-url http://localhost:8000 \
              --table-name "$table" \
              --attribute-definitions \
                AttributeName=PK,AttributeType=S \
                AttributeName=SK,AttributeType=S \
              --key-schema \
                AttributeName=PK,KeyType=HASH \
                AttributeName=SK,KeyType=RANGE \
              --billing-mode PAY_PER_REQUEST \
              --region us-east-1
          done

      - name: Run unit tests (all services)
        run: |
          pytest services/profile_service/tests/unit/ \
                 services/loan_tracker/tests/unit/ \
                 services/risk_assessment/tests/unit/ \
                 services/cashflow_service/tests/ \
                 services/early_warning/tests/ \
                 services/guidance/tests/ \
                 services/security/tests/ \
            -v --tb=short --cov=services --cov-report=term-missing

      - name: Run property-based tests
        run: |
          pytest services/profile_service/tests/property/ \
            -v --tb=short

  build:
    name: SAM Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [profile_service, loan_tracker, risk_assessment, cashflow_service, early_warning, guidance, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build (${{ matrix.service }})
        run: |
          cd services/${{ matrix.service }}
          sam build

      - name: SAM Validate (${{ matrix.service }})
        run: |
          cd services/${{ matrix.service }}
          sam validate --lint
